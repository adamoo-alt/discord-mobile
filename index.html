<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discord Mobile Panel</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #1e1f22; color: #dbdee1; padding: 15px; }
        
        h1 { font-size: 18px; color: #fff; margin-bottom: 15px; }
        .card { background: #2b2d31; padding: 15px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #1f2023; }
        
        .btn { display: inline-block; background: #5865f2; color: white; padding: 10px 16px; border-radius: 6px; text-decoration: none; font-size: 14px; font-weight: 500; border: none; cursor: pointer; text-align: center; width: 100%; margin-top: 5px; }
        .btn-success { background: #248046; }
        .btn-danger { background: #da373c; }
        
        .account-item { display: flex; justify-content: space-between; align-items: center; background: #313338; padding: 10px; border-radius: 6px; margin-top: 8px; border: 1px solid transparent; cursor: pointer; }
        .account-item.selected { border-color: #5865f2; background: #2b2d31; }
        
        input, select { width: 100%; padding: 10px; background: #1e1f22; border: 1px solid #383a40; color: #dbdee1; border-radius: 6px; margin-top: 8px; margin-bottom: 12px; font-size: 14px; }
        label { font-size: 12px; color: #949ba4; font-weight: bold; text-transform: uppercase; }
        
        #control-panel { display: none; }
    </style>
</head>
<body>

    <h1>Panel Zarządzania Discord</h1>

    <div id="login-screen" class="card" style="display:none;">
        <p style="margin-bottom: 12px; font-size: 14px; color: #949ba4;">Dodaj konto przez autoryzację:</p>
        <a id="auth-link" href="#" class="btn">Zaloguj konto przez Discorda</a>
    </div>

    <div class="card">
        <h3 style="font-size: 15px; color: #fff; margin-bottom: 10px;">Twoje połączone konta</h3>
        <div id="accounts-list"></div>
        <button onclick="addAnotherAccount()" class="btn btn-success" style="margin-top: 12px;">+ Dodaj kolejne konto</button>
    </div>

    <!-- Panel Sterowania Wybranym Kontem -->
    <div id="control-panel" class="card">
        <h3 style="font-size: 15px; color: #fff; margin-bottom: 12px;">Zarządzasz kontem: <span id="active-username" style="color: #5865f2;">-</span></h3>
        
        <div style="margin-bottom: 15px;">
            <label>Dołącz na Serwer (Kod Zaproszenia)</label>
            <input type="text" id="invite-code" placeholder="np. discord lub dsc.gg/twojkod">
            <button onclick="joinServer()" class="btn btn-success">Dołącz na Serwer</button>
        </div>

        <div style="margin-bottom: 15px; border-top: 1px solid #383a40; padding-top: 15px;">
            <label>Konfiguracja RPC / Aktywność Gry</label>
            <input type="text" id="rpc-game" placeholder="Nazwa gry / status (np. Brawl Stars)">
            <input type="text" id="rpc-details" placeholder="Szczegóły (np. Pushing 1000 trophies)">
            <input type="text" id="rpc-image" placeholder="URL lub klucz ikony (np. logo_gry)">
            <label style="display: flex; align-items: center; gap: 8px; margin-top: 5px; cursor: pointer;">
                <input type="checkbox" id="rpc-timestamp" style="width: auto; margin: 0;"> Dodaj znacznik czasu (Elapsed Time)
            </label>
            <button onclick="saveRpcConfig()" class="btn" style="margin-top: 10px;">Zapisz ustawienia RPC</button>
        </div>

        <div>
            <label>Akcje Sesji</label>
            <button onclick="removeActiveAccount()" class="btn btn-danger">Wyloguj / Usuń to konto</button>
        </div>
    </div>

    <div class="card">
        <button onclick="logoutAll()" class="btn btn-danger" style="background: #963c3c;">Wyczyść wszystkie sesje</button>
    </div>

    <script>
        const CLIENT_ID = "1529564710083629241"; 
        const REDIRECT_URI = window.location.origin + window.location.pathname;
        
        // Zaktualizowany link autoryzacyjny zgodny z Twoim zapytaniem
        const discordAuthUrl = `https://discord.com/api/oauth2/authorize?client_id=${CLIENT_ID}&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&response_type=token&scope=guilds.join+identify+guilds+guilds.members.read+rpc.notifications.read`;

        document.getElementById('auth-link').href = discordAuthUrl;

        let accounts = JSON.parse(localStorage.getItem('discord_accounts') || '[]');
        let selectedAccountId = localStorage.getItem('selected_discord_id') || (accounts.length > 0 ? accounts[0].id : null);

        window.addEventListener('DOMContentLoaded', () => {
            const fragment = new URLSearchParams(window.location.hash.slice(1));
            const accessToken = fragment.get('access_token');

            if (accessToken) {
                fetch('https://discord.com/api/users/@me', {
                    headers: { 'Authorization': `Bearer ${accessToken}` }
                })
                .then(res => res.json())
                .then(user => {
                    if (user.id) {
                        const existsIndex = accounts.findIndex(acc => acc.id === user.id);
                        if (existsIndex > -1) {
                            accounts[existsIndex].token = accessToken;
                        } else {
                            accounts.push({ id: user.id, username: user.username, token: accessToken, rpc: {} });
                        }
                        localStorage.setItem('discord_accounts', JSON.stringify(accounts));
                        localStorage.setItem('selected_discord_id', user.id);
                        window.history.replaceState({}, document.title, window.location.pathname);
                        location.reload();
                    }
                }).catch(err => console.error(err));
            }

            renderUI();
        });

        function renderUI() {
            if (accounts.length === 0) {
                document.getElementById('login-screen').style.display = 'block';
                return;
            }

            const listContainer = document.getElementById('accounts-list');
            listContainer.innerHTML = '';

            accounts.forEach((acc) => {
                const div = document.createElement('div');
                div.className = `account-item ${acc.id === selectedAccountId ? 'selected' : ''}`;
                div.innerHTML = `
                    <span style="font-size: 14px; font-weight: 500;"><b>${acc.username}</b></span>
                    <span style="font-size: 12px; color: #949ba4;">${acc.id === selectedAccountId ? '▶ Aktywne' : 'Wybierz'}</span>
                `;
                div.onclick = () => {
                    selectedAccountId = acc.id;
                    localStorage.setItem('selected_discord_id', acc.id);
                    renderUI();
                };
                listContainer.appendChild(div);
            });

            if (selectedAccountId) {
                const currentAcc = accounts.find(acc => acc.id === selectedAccountId);
                if (currentAcc) {
                    document.getElementById('control-panel').style.display = 'block';
                    document.getElementById('active-username').innerText = currentAcc.username;
                    
                    // Wczytaj zapisane RPC dla tego konta jeśli istnieje
                    if (currentAcc.rpc) {
                        document.getElementById('rpc-game').value = currentAcc.rpc.game || '';
                        document.getElementById('rpc-details').value = currentAcc.rpc.details || '';
                        document.getElementById('rpc-image').value = currentAcc.rpc.image || '';
                        document.getElementById('rpc-timestamp').checked = currentAcc.rpc.useTimestamp || false;
                    }
                }
            }
        }

        function getActiveToken() {
            const acc = accounts.find(a => a.id === selectedAccountId);
            return acc ? acc.token : null;
        }

        async function joinServer() {
            let input = document.getElementById('invite-code').value.trim();
            const code = input.split('/').pop();
            const token = getActiveToken();

            if (!code || !token) {
                alert('Podaj kod zaproszenia i upewnij się, że konto jest wybrane!');
                return;
            }

            try {
                const res = await fetch(`https://discord.com/api/v10/invites/${code}`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (res.ok) {
                    alert('Sukces! Konto dołączyło na serwer.');
                } else {
                    const data = await res.json();
                    alert('Błąd dołączania: ' + (data.message || 'Nieznany'));
                }
            } catch (e) {
                alert('Błąd sieciowy.');
            }
        }

        function saveRpcConfig() {
            const game = document.getElementById('rpc-game').value;
            const details = document.getElementById('rpc-details').value;
            const image = document.getElementById('rpc-image').value;
            const useTimestamp = document.getElementById('rpc-timestamp').checked;

            const accIndex = accounts.findIndex(a => a.id === selectedAccountId);
            if (accIndex > -1) {
                accounts[accIndex].rpc = {
                    game,
                    details,
                    image,
                    useTimestamp,
                    startTime: useTimestamp ? Date.now() : null
                };
                localStorage.setItem('discord_accounts', JSON.stringify(accounts));
                alert('Konfiguracja RPC została zapisana w pamięci panelu!');
            }
        }

        function addAnotherAccount() {
            window.location.href = discordAuthUrl;
        }

        function removeActiveAccount() {
            accounts = accounts.filter(acc => acc.id !== selectedAccountId);
            localStorage.setItem('discord_accounts', JSON.stringify(accounts));
            localStorage.removeItem('selected_discord_id');
            location.reload();
        }

        function logoutAll() {
            localStorage.clear();
            location.reload();
        }
    </script>
</body>
</html>

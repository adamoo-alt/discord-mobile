<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobile Multi-Account Discord Manager</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #1e1f22; color: #dbdee1; height: 100vh; display: flex; flex-direction: column; }
        
        header { background: #2b2d31; padding: 10px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #1f2023; }
        h1 { font-size: 16px; color: #fff; }
        
        .toolbar { display: flex; gap: 5px; overflow-x: auto; padding: 8px; background: #2b2d31; border-bottom: 1px solid #1f2023; }
        .tab-btn { background: #35363c; border: none; color: #dbdee1; padding: 6px 12px; border-radius: 4px; font-size: 13px; cursor: pointer; white-space: nowrap; }
        .tab-btn.active { background: #5865f2; color: #fff; }
        .add-btn { background: #248046; color: #fff; }

        .container { flex: 1; position: relative; width: 100%; height: calc(100vh - 100px); }
        .account-view { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; display: none; background: #313338; }
        .account-view.active { display: block; }
        
        .welcome-screen { display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100%; padding: 20px; text-align: center; }
        .welcome-screen button { padding: 12px 24px; background: #5865f2; color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; margin-top: 15px; }
    </style>
</head>
<body>

    <header>
        <h1>Discord Multi-Manager</h1>
        <span id="account-count" style="font-size: 12px; color: #949ba4;">Konta: 0</span>
    </header>

    <div class="toolbar" id="toolbar">
        <button class="tab-btn add-btn" onclick="addNewAccount()">+ Dodaj Konto</button>
    </div>

    <div class="container" id="container">
        <div id="welcome" class="welcome-screen account-view active">
            <h2>Brak aktywnych sesji</h2>
            <p style="color: #949ba4; margin-top: 5px; font-size: 14px;">Kliknij przycisk poniżej, aby dodać pierwszą instancję konta Discord.</p>
            <button onclick="addNewAccount()">Stwórz instancję konta</button>
        </div>
    </div>

    <script>
        let accounts = [];
        let activeId = null;

        function addNewAccount() {
            const id = Date.now();
            accounts.push(id);
            
            // Tworzenie przycisku w pasku
            const toolbar = document.getElementById('toolbar');
            const btn = document.createElement('button');
            btn.className = 'tab-btn';
            btn.id = `btn-${id}`;
            btn.innerText = `Konto ${accounts.length}`;
            btn.onclick = () => switchAccount(id);
            toolbar.insertBefore(btn, toolbar.lastElementChild);

            // Tworzenie ramki dla Discorda
            const container = document.getElementById('container');
            const iframe = document.createElement('iframe');
            iframe.className = 'account-view';
            iframe.id = `view-${id}`;
            iframe.src = 'https://discord.com/login';
            container.appendChild(iframe);

            document.getElementById('welcome').style.display = 'none';
            switchAccount(id);
            updateCounter();
        }

        function switchAccount(id) {
            activeId = id;
            document.querySelectorAll('.account-view').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));

            const targetView = document.getElementById(`view-${id}`);
            const targetBtn = document.getElementById(`btn-${id}`);
            
            if (targetView) targetView.classList.add('active');
            if (targetBtn) targetBtn.classList.add('active');
        }

        function updateCounter() {
            document.getElementById('account-count').innerText = `Konta: ${accounts.length}`;
        }
    </script>
</body>
</html>
